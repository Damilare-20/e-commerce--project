<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <title>DAMMYSHOP - Login</title>
</head>
<body class="bg-[#fdf6e3]/25 min-h-screen flex flex-col">
   <nav
      class="bg-white shadow-md sticky top-0 z-[9999] px-6 py-4 flex items-center justify-between"
    >
      <div class="flex items-center space-x-6">
        <span class="text-2xl font-bold">
        <a href="index.html">  <span class="text-black">DAMMY</span
          ><span class="text-orange-500">SHOP</span></a>
        </span>
         <a href="product.html" class="hover:text-orange-500"
          >Products</a
        >
        <a href="About.html" class="hover:text-orange-500"
          >About</a
        >
      </div>
      <div class="flex-1 max-w-lg mx-6">
        <div class="relative">
          <input
            type="text"
            id="search"
            placeholder="Search products..."
            class="w-full border border-gray-300 rounded-full py-2 pl-10 pr-4 focus:ring-orange-500 focus:border-orange-500"
          />
          <span class="absolute left-3 top-2.5 text-gray-400">
            <i class="fa-solid fa-magnifying-glass"></i>
          </span>
        </div>
      </div>
      <div class="flex items-center space-x-10">
        <a href="contacts.html" class="hover:text-orange-500"
          >Contacts</a
        >
        <a
          href="cart.html"
          class="relative text-gray-700 hover:text-orange-500"
        >
          <i class="fa-solid fa-cart-shopping text-xl"></i>
          <span
            id="cart-count"
            class="absolute -top-2 -right-2 bg-orange-500 text-white text-xs rounded-full w-5 h-5 flex items-center justify-center"
          >
            0
          </span>
        </a>
        <a href="login.html" class="hover:text-orange-500"
          >Sign In</a
        >
        <a
          href="register.html"
          class="bg-orange-500 text-white px-4 py-2 rounded-md hover:bg-orange-600 transition"
        >
          Register
        </a>
      </div>
    </nav>

  <main class="flex-grow flex items-center justify-center mt-10">
    <div class="bg-white shadow-lg rounded-lg p-8 w-full max-w-md">
      <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">Login to DAMMYSHOP</h2>
      <form id="login-form" class="space-y-4">
  <div>
    <label for="login-email" class="block text-gray-600 mb-2">Email</label>
    <input 
      type="email" 
      id="login-email" 
      placeholder="Enter your email" 
      class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-orange-300"
    />
  </div>
  <div>
    <label for="login-password" class="block text-gray-600 mb-2">Password</label>
    <input 
      type="password" 
      id="login-password" 
      placeholder="Enter your password" 
      class="w-full px-4 py-2 border rounded-lg focus:ring focus:ring-orange-300"
    />
  </div>
  <button 
    type="submit" 
    class="w-full bg-orange-500 text-white py-2 rounded-lg hover:bg-orange-600 transition"
  >
    Login
  </button>
  <div id="login-error" class="text-red-600 text-sm mt-2"></div>
</form>

      <p class="mt-4 text-sm text-gray-500 text-center">
        Don’t have an account? <a href="register.html" class="text-orange-500 hover:underline">Register</a>
      </p>
    </div>
  </main>

  <script src="login.js"></script>
</body>
</html>
